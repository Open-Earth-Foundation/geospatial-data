datasets:
  - dataset_id: dynamic_world_30m
    dataset_name: Dynamic World V1 
    publisher: World Resources Institute Google
    license: CC-BY 4.0
    resolution: 10m
    access_type: gee
    source_url: https://developers.google.com/earth-engine/datasets/catalog/GOOGLE_DYNAMICWORLD_V1#description
    dataset_type: land_cover
    type: categorical_raster
    assets:
      visual_tiles:
        url_template:
          - https://geo-test-api.s3.us-east-1.amazonaws.com/nbs/porto_alegre/land_use/dynamic_world/V1/2023/tiles_visual/{z}/{x}/{y}.png
      value_tiles:
        url_template:
          - https://geo-test-api.s3.us-east-1.amazonaws.com/nbs/porto_alegre/land_use/dynamic_world/V1/2023/tiles_values/{z}/{x}/{y}.png
      download:
        cog_url:
          - https://geo-test-api.s3.us-east-1.amazonaws.com/nbs/porto_alegre/land_use/dynamic_world/V1/2023/land_use_cog.tif
      metadata:
        url:
          - https://geo-test-api.s3.amazonaws.com/nbs/porto_alegre/land_use/v2026-03-06/metadata.json
    description: Versioned categorical land-use raster exposed by the test API for Porto Alegre.
    
  - dataset_id: dem_copernicus_30m
    dataset_name: Copernicus DEM
    publisher: Copernicus
    license: Copernicus License
    resolution: 30m
    access_type: gee
    source_url: https://developers.google.com/earth-engine/datasets/catalog/COPERNICUS_DEM_GLO30
    dataset_type: elevation
    type: numeric_raster
    assets:
      visual_tiles:
        url_template: []
      value_tiles:
        url_template: []
      download:
        cog_url: []
      metadata:
        url: []
    description: Global digital elevation model used for terrain indicators.

  - dataset_id: esa_worldcover_10m
    dataset_name: ESA WorldCover
    publisher: ESA
    license: CC BY 4.0
    resolution: 10m
    access_type: gee
    source_url: https://developers.google.com/earth-engine/datasets/catalog/ESA_WorldCover_v200
    dataset_type: land_cover
    type: categorical_raster
    assets:
      visual_tiles:
        url_template: []
      value_tiles:
        url_template: []
      download:
        cog_url: []
      metadata:
        url: []
    description: Global land cover baseline for impervious and ecosystem indicators.

  - dataset_id: worldpop_population
    dataset_name: WorldPop Population Density
    publisher: WorldPop
    license: CC BY 4.0
    resolution: 100m
    access_type: manual_download
    source_url: https://www.worldpop.org
    dataset_type: population
    type: numeric_raster
    assets:
      visual_tiles:
        url_template: []
      value_tiles:
        url_template: []
      download:
        cog_url: []
      metadata:
        url: []
    description: Population distribution raster used for exposure analysis.

  - dataset_id: osm_building_footprints
    dataset_name: OSM Building Footprints
    publisher: OpenStreetMap Contributors
    license: ODbL 1.0
    resolution: vector
    access_type: public_api
    source_url: https://www.openstreetmap.org
    dataset_type: buildings
    type: vector
    assets:
      visual_tiles:
        url_template: []
      value_tiles:
        url_template: []
      download:
        cog_url: []
      metadata:
        url: []
    description: Building geometries used to derive building density and built exposure.

  - dataset_id: poa_gtfs
    dataset_name: GTFS Porto Alegre
    publisher: EPTC (Empresa Pública de Transporte e Circulação)
    license: CC BY 4.0
    resolution: vector
    crs: EPSG:4326
    access_type: manual_download
    source_url: https://dadosabertos.poa.br/dataset/gtfs
    dataset_type: transport
    type: vector
    assets:
      bus_routes:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/poa-gtfs/release/2024-10-01/shapes.geojson
      bus_stops:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/poa-gtfs/release/2024-10-01/stops.geojson
    description: >
      General Transit Feed Specification (GTFS) for Porto Alegre bus transit.
      Includes routes, stops, shapes, and schedules.

  - dataset_id: global_solar_atlas
    dataset_name: Global Solar Atlas PV Output
    publisher: World Bank Group, Solargis
    license: Free for non-commercial use
    resolution: 930m
    crs: EPSG:3857
    access_type: manual_download
    source_url: https://globalsolaratlas.info/download/brazil
    dataset_type: solar
    type: numeric_raster
    data_quality:
      temporal_coverage: "1999-2018 (LTAy)"
      accuracy: "±4% typical for PVOUT"
      limitations: "Regional screening; site-specific validation recommended for project planning"
    value_encoding:
      type: terrain_rgb
      scale: 0.001
      offset: 0.0
      unit: "kWh/kWp/day"
      decode_formula: "value = (R * 256 * 256 + G * 256 + B) * scale + offset"
    assets:
      visual_tiles:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/global_solar_atlas/release/v2/tiles_pvout/{z}/{x}/{y}.png
      value_tiles:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/global_solar_atlas/release/v2/tiles_pvout_values/{z}/{x}/{y}.png
      download:
        cog_url: https://geo-test-api.s3.us-east-1.amazonaws.com/global_solar_atlas/release/v2/poa_PVOUT_cog.tif
      neighbourhoods:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/global_solar_atlas/release/v2/poa_solar_neighbourhoods.geojson
      metadata:
        url: https://geo-test-api.s3.us-east-1.amazonaws.com/global_solar_atlas/release/v2/pvout_metadata.json
    description: >
      PV Output (kWh/kWp/day) from Global Solar Atlas Brazil LTAy AvgDailyTotals.

  - dataset_id: br_ibge
    dataset_name: IBGE Census Data
    publisher: IBGE (Instituto Brasileiro de Geografia e Estatística)
    license: CC BY 4.0
    resolution: vector
    crs: EPSG:4326
    access_type: public_api
    source_url: https://servicodados.ibge.gov.br/api/docs
    dataset_type: census
    type: vector
    data_quality:
      temporal_coverage: "2010 (indicators), 2022 (informal settlements)"
      accuracy: "Official statistics; possible undercount in informal areas"
      limitations: "Indicators from Census 2010; FCU boundaries from Census 2022; some FCUs not yet sectorized"
    assets:
      indicators:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/br_ibge/release/2010/porto_alegre/porto_alegre_indicators.geojson
      informal_settlements:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/br_ibge/release/2024/porto_alegre/poa_informal_settlements.geojson
    description: >
      IBGE Census data for Porto Alegre. Includes neighbourhood-level indicators (Census 2010, SIDRA API)
      and informal settlement polygons (Census 2022, favelas e comunidades urbanas).
