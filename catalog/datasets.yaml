datasets:
  - dataset_id: dynamic_world
    dataset_name: Dynamic World V1 
    publisher: World Resources Institute Google
    license: CC-BY 4.0
    resolution: 10m
    access_type: gee
    source_url: https://developers.google.com/earth-engine/datasets/catalog/GOOGLE_DYNAMICWORLD_V1#description
    dataset_type: land_cover
    type: categorical_raster
    data_quality:
      temporal_coverage: "2015 to present (annual composites)"
      accuracy: "Deep learning classification; ~10m resolution"
      limitations: "Annual composite, cloud-filtered; may underrepresent ephemeral land cover"
    value_encoding:
      type: class_lookup
      classes:
        0: { name: Water, color: "#62B0CC" }
        1: { name: Trees, color: "#488C5F" }
        2: { name: Grass, color: "#98B982" }
        3: { name: Flooded vegetation, color: "#A0AAC3" }
        4: { name: Crops, color: "#D7A55F" }
        5: { name: Shrub, color: "#CDB982" }
        6: { name: Built, color: "#B45F55" }
        7: { name: Bare, color: "#AFA89E" }
        8: { name: Snow, color: "#B9CDE1" }
    assets:
      visual_tiles:
        url_template:
          - https://geo-test-api.s3.us-east-1.amazonaws.com/dynamic_world/release/v1/2023/porto_alegre/tiles_visual/{z}/{x}/{y}.png
      value_tiles:
        url_template:
          - https://geo-test-api.s3.us-east-1.amazonaws.com/dynamic_world/release/v1/2023/porto_alegre/tiles_values/{z}/{x}/{y}.png
      download:
        cog_url:
          - https://geo-test-api.s3.us-east-1.amazonaws.com/dynamic_world/release/v1/2023/porto_alegre/poa_dynamicworld_cog.tif
      metadata:
        url:
          - https://geo-test-api.s3.us-east-1.amazonaws.com/dynamic_world/release/v1/2023/porto_alegre/metadata.json
    description: Versioned categorical land-use raster exposed by the test API for Porto Alegre.

  - dataset_id: poa_gtfs
    dataset_name: GTFS Porto Alegre
    publisher: EPTC (Empresa Pública de Transporte e Circulação)
    license: CC BY 4.0
    resolution: vector
    crs: EPSG:4326
    access_type: manual_download
    source_url: https://dadosabertos.poa.br/dataset/gtfs
    dataset_type: transport
    type: vector
    assets:
      bus_routes:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/poa-gtfs/release/2024-10-01/shapes.geojson
      bus_stops:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/poa-gtfs/release/2024-10-01/stops.geojson
    description: >
      General Transit Feed Specification (GTFS) for Porto Alegre bus transit.
      Includes routes, stops, shapes, and schedules.

  - dataset_id: global_solar_atlas
    dataset_name: Global Solar Atlas PV Output
    publisher: World Bank Group, Solargis
    license: Free for non-commercial use
    resolution: 930m
    crs: EPSG:3857
    access_type: manual_download
    source_url: https://globalsolaratlas.info/download/brazil
    dataset_type: solar
    type: numeric_raster
    data_quality:
      temporal_coverage: "1999-2018 (LTAy)"
      accuracy: "±4% typical for PVOUT"
      limitations: "Regional screening; site-specific validation recommended for project planning"
    value_encoding:
      type: terrain_rgb
      scale: 0.001
      offset: 0.0
      unit: "kWh/kWp/day"
      decode_formula: "value = (R * 256 * 256 + G * 256 + B) * scale + offset"
    assets:
      visual_tiles:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/global_solar_atlas/release/v2/tiles_pvout/{z}/{x}/{y}.png
      value_tiles:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/global_solar_atlas/release/v2/tiles_pvout_values/{z}/{x}/{y}.png
      download:
        cog_url: https://geo-test-api.s3.us-east-1.amazonaws.com/global_solar_atlas/release/v2/poa_PVOUT_cog.tif
      neighbourhoods:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/global_solar_atlas/release/v2/poa_solar_neighbourhoods.geojson
      metadata:
        url: https://geo-test-api.s3.us-east-1.amazonaws.com/global_solar_atlas/release/v2/pvout_metadata.json
    description: >
      PV Output (kWh/kWp/day) from Global Solar Atlas Brazil LTAy AvgDailyTotals.

  - dataset_id: ghsl_built_up
    dataset_name: GHSL Built-Up Settlement Grid
    publisher: JRC (Joint Research Centre)
    license: CC BY 4.0
    resolution: 100m
    crs: EPSG:3857
    access_type: gee
    source_url: https://developers.google.com/earth-engine/datasets/catalog/JRC_GHSL_P2023A_GHS_BUILT_S
    dataset_type: built_up
    type: numeric_raster
    data_quality:
      temporal_coverage: "2025 (P2023A)"
      accuracy: "Built-up surface in m² per 100m grid cell"
      limitations: "Clamped 0–10000 m² for value tiles"
    value_encoding:
      type: rgb_packed
      scale: 1.0
      offset: 0.0
      unit: "m²"
      decode_formula: "value = R + 256*G + 65536*B"
    assets:
      visual_tiles:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/ghsl_built_up/release/v1/2025/porto_alegre/tiles_visual/{z}/{x}/{y}.png
      value_tiles:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/ghsl_built_up/release/v1/2025/porto_alegre/tiles_values/{z}/{x}/{y}.png
      download:
        cog_url: https://geo-test-api.s3.us-east-1.amazonaws.com/ghsl_built_up/release/v1/2025/porto_alegre/poa_ghsl_built_up_100m_p2023a_2025_cog.tif
      metadata:
        url: []
    description: >
      GHSL Built-Up P2023A built-up surface (m² per 100m cell) for Porto Alegre.
      Exported from GEE GHS_BUILT_S 2025, clipped and tiled for mapping.

  - dataset_id: ghsl_degree_urbanization
    dataset_name: GHSL Degree of Urbanization (SMOD)
    publisher: JRC (Joint Research Centre)
    license: CC BY 4.0
    resolution: 1000m
    crs: EPSG:3857
    access_type: gee
    source_url: https://developers.google.com/earth-engine/datasets/catalog/JRC_GHSL_P2023A_GHS_SMOD_V2-0
    dataset_type: settlement
    type: categorical_raster
    data_quality:
      temporal_coverage: "2025 (P2023A)"
      accuracy: "Eurostat Degree of Urbanisation methodology"
      limitations: "1 km grid; class from population and built-up density"
    value_encoding:
      type: class_lookup
      classes:
        10: { name: Water, color: "#7AB6F5" }
        11: { name: Very low density rural, color: "#CDF57A" }
        12: { name: Low density rural, color: "#ABCD66" }
        13: { name: Rural cluster, color: "#375623" }
        21: { name: Suburban or peri-urban, color: "#FFFF00" }
        22: { name: Semi-dense urban cluster, color: "#A87000" }
        23: { name: Dense urban cluster, color: "#732600" }
        30: { name: Urban centre, color: "#FF0000" }
    assets:
      visual_tiles:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/ghsl_degree_urbanization/release/v2/2024/porto_alegre/tiles_visual/{z}/{x}/{y}.png
      value_tiles:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/ghsl_degree_urbanization/release/v2/2024/porto_alegre/tiles_values/{z}/{x}/{y}.png
      download:
        cog_url: https://geo-test-api.s3.us-east-1.amazonaws.com/ghsl_degree_urbanization/release/v2/2024/porto_alegre/poa_ghsl_degree_urb_1000m_p2023a_2025_cog.tif
      metadata:
        url: []
    description: >
      GHSL Degree of Urbanization (SMOD) P2023A for Porto Alegre.
      Rural-urban classification (water, rural, suburban, urban centre) at 1 km resolution.

  - dataset_id: ghsl_population
    dataset_name: GHSL Population Grid
    publisher: JRC (Joint Research Centre)
    license: CC BY 4.0
    resolution: 100m
    crs: EPSG:3857
    access_type: gee
    source_url: https://developers.google.com/earth-engine/datasets/catalog/JRC_GHSL_P2023A_GHS_POP
    dataset_type: population
    type: numeric_raster
    data_quality:
      temporal_coverage: "2025 (P2023A)"
      accuracy: "Inhabitants per 100m grid cell"
      limitations: "Clamped 0–16777215 for value tiles (24-bit rgb_packed)"
    value_encoding:
      type: rgb_packed
      scale: 1.0
      offset: 0.0
      unit: "inhabitants"
      decode_formula: "value = R + 256*G + 65536*B"
    assets:
      visual_tiles:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/ghsl_population/release/v1/2025/porto_alegre/tiles_visual/{z}/{x}/{y}.png
      value_tiles:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/ghsl_population/release/v1/2025/porto_alegre/tiles_values/{z}/{x}/{y}.png
      download:
        cog_url: https://geo-test-api.s3.us-east-1.amazonaws.com/ghsl_population/release/v1/2025/porto_alegre/poa_ghsl_pop_100m_p2023a_2025_cog.tif
      metadata:
        url: []
    description: >
      GHSL Population P2023A inhabitants per 100m cell for Porto Alegre.
      Exported from GEE GHS_POP 2025, clipped and tiled for mapping.

  - dataset_id: br_ibge
    dataset_name: IBGE Census Data
    publisher: IBGE (Instituto Brasileiro de Geografia e Estatística)
    license: CC BY 4.0
    resolution: vector
    crs: EPSG:4326
    access_type: public_api
    source_url: https://servicodados.ibge.gov.br/api/docs
    dataset_type: census
    type: vector
    data_quality:
      temporal_coverage: "2010 (indicators), 2022 (informal settlements)"
      accuracy: "Official statistics; possible undercount in informal areas"
      limitations: "Indicators from Census 2010; FCU boundaries from Census 2022; some FCUs not yet sectorized"
    assets:
      indicators:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/br_ibge/release/2010/porto_alegre/porto_alegre_indicators.geojson
      informal_settlements:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/br_ibge/release/2024/porto_alegre/poa_informal_settlements.geojson
    description: >
      IBGE Census data for Porto Alegre. Includes neighbourhood-level indicators (Census 2010, SIDRA API)
      and informal settlement polygons (Census 2022, favelas e comunidades urbanas).

  - dataset_id: noaa_viirs_nightlights
    dataset_name: NOAA VIIRS Night Lights
    publisher: NOAA
    license: Public domain
    resolution: 500m
    crs: EPSG:3857
    access_type: gee
    source_url: https://developers.google.com/earth-engine/datasets/catalog/NOAA_VIIRS_DNB_MONTHLY_V1_VCMSLCFG
    dataset_type: night_lights
    type: numeric_raster
    data_quality:
      temporal_coverage: "2014 to present (monthly composites)"
      accuracy: "Stray-light corrected; avg_rad in nW/cm²/sr"
      limitations: "VCMSLCFG extends coverage toward poles with reduced quality; cf_cvg band indicates cloud-free coverage"
    value_encoding:
      type: terrain_rgb
      scale: 0.1
      offset: 0.0
      unit: "nW/cm²/sr"
      decode_formula: "value = (R * 256 * 256 + G * 256 + B) * scale + offset"
    assets:
      visual_tiles:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/noaa_viirs_nightlights/release/v1/2024/tiles_visual/{z}/{x}/{y}.png
      value_tiles:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/noaa_viirs_nightlights/release/v1/2024/tiles_values/{z}/{x}/{y}.png
      download:
        cog_url: https://geo-test-api.s3.us-east-1.amazonaws.com/noaa_viirs_nightlights/release/v1/2024/poa_nightlights_cog.tif
      metadata:
        url: https://geo-test-api.s3.us-east-1.amazonaws.com/noaa_viirs_nightlights/release/v1/2024/nightlights_metadata.json
    description: >
      VIIRS Day/Night Band (DNB) average radiance for Porto Alegre. Annual mean composite from monthly
      stray-light corrected imagery. Proxy for human activity and electrification.

  - dataset_id: copernicus_emsn194
    dataset_name: Copernicus EMS Max Water Depth (EMSN194)
    publisher: Copernicus Emergency Management Service (CEMS)
    license: Copernicus License (EU free for use)
    resolution: 30m
    crs: EPSG:3857
    access_type: manual_download
    source_url: https://mapping.emergency.copernicus.eu/activations/EMSN194/
    dataset_type: flood
    type: numeric_raster
    data_quality:
      temporal_coverage: "May 2024 (flood event)"
      accuracy: "Risk and Recovery Mapping delineation products"
      limitations: "Single-event snapshot; Porto Alegre AOI only"
    value_encoding:
      type: terrain_rgb
      scale: 0.01
      offset: 0.0
      unit: "m"
      decode_formula: "value = (R * 256 * 256 + G * 256 + B) * scale + offset"
    assets:
      visual_tiles:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/copernicus_emsn194/release/v1/2024/porto_alegre/tiles_visual/{z}/{x}/{y}.png
      value_tiles:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/copernicus_emsn194/release/v1/2024/porto_alegre/tiles_values/{z}/{x}/{y}.png
      download:
        cog_url: https://geo-test-api.s3.us-east-1.amazonaws.com/copernicus_emsn194/release/v1/2024/porto_alegre/maxwaterdepth_cog.tif
      metadata:
        url: https://geo-test-api.s3.us-east-1.amazonaws.com/copernicus_emsn194/release/v1/2024/porto_alegre/maxwaterdepth_metadata.json
    description: >
      Max water depth (m) from Copernicus EMS Risk and Recovery Mapping activation EMSN194.
      Flood delineation for Porto Alegre, Rio Grande do Sul, May 2024.

  - dataset_id: modis_ndvi
    dataset_name: MODIS NDVI (MOD13Q1)
    publisher: NASA LP DAAC / USGS EROS
    license: No restrictions on use
    resolution: 250m
    crs: EPSG:3857
    access_type: gee
    source_url: https://developers.google.com/earth-engine/datasets/catalog/MODIS_061_MOD13Q1
    dataset_type: vegetation
    type: numeric_raster
    data_quality:
      temporal_coverage: "2000 to present (16-day composites)"
      accuracy: "Atmospherically corrected; masked for clouds, water, aerosols"
      limitations: "250m resolution; annual mean composite for mapping"
    value_encoding:
      type: terrain_rgb
      scale: 0.001
      offset: -1.0
      unit: ""
      decode_formula: "value = (R * 256 * 256 + G * 256 + B) * scale + offset"
    assets:
      visual_tiles:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/modis_ndvi/release/v1/2024/tiles_visual/{z}/{x}/{y}.png
      value_tiles:
        url_template: https://geo-test-api.s3.us-east-1.amazonaws.com/modis_ndvi/release/v1/2024/tiles_values/{z}/{x}/{y}.png
      download:
        cog_url: https://geo-test-api.s3.us-east-1.amazonaws.com/modis_ndvi/release/v1/2024/ndvi_cog.tif
      metadata:
        url: https://geo-test-api.s3.us-east-1.amazonaws.com/modis_ndvi/release/v1/2024/ndvi_metadata.json
    description: >
      Normalized Difference Vegetation Index (NDVI) from MODIS Terra MOD13Q1.
      Annual mean composite for Porto Alegre. Values -1 to 1 (scaled from raw 0.0001).