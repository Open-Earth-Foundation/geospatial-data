# Collections group datasets for discovery. Optional `group` field enables UI grouping.
# All dataset_ids must exist in catalog/datasets.yaml.

collections:
  # --- Land & vegetation ---
  - id: land_cover
    name: Land cover
    group: land_environment
    datasets:
      - dynamic_world

  - id: vegetation
    name: Vegetation
    group: land_environment
    datasets:
      - modis_ndvi

  - id: forest
    name: Forest
    group: land_environment
    datasets:
      - hansen_forest_change

  # --- Water & flood ---
  - id: water
    name: Surface water
    group: water_flood
    datasets:
      - jrc_global_surface_water

  - id: hydrography
    name: Hydrography
    group: water_flood
    datasets:
      - merit_hydro

  - id: flood
    name: Flood
    group: water_flood
    datasets:
      - copernicus_emsn194

  # --- Built environment ---
  - id: buildings
    name: Buildings
    group: built_environment
    datasets:
      - ghsl_built_up

  - id: settlement
    name: Settlement / Urbanization
    group: built_environment
    datasets:
      - ghsl_degree_urbanization

  # --- Population & socioeconomics ---
  - id: population
    name: Population
    group: population_socio
    datasets:
      - ghsl_population

  - id: socioeconomics
    name: Socioeconomics
    group: population_socio
    datasets:
      - br_ibge

  # --- Infrastructure & energy ---
  - id: transport
    name: Transport
    group: infrastructure
    datasets:
      - poa_gtfs

  - id: solar
    name: Solar
    group: infrastructure
    datasets:
      - global_solar_atlas

  - id: night_lights
    name: Night lights
    group: infrastructure
    datasets:
      - noaa_viirs_nightlights

  # --- Terrain ---
  - id: elevation
    name: Elevation
    group: terrain
    datasets:
      - copernicus_dem
